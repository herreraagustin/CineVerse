<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="keywords"
      content="suscripción streaming, planes streaming, CineVerse Premium, planes, membresía, streaming HD"
    />
    <meta
      name="description"
      content="Conoce los planes de suscripción de CineVerse y elige el que mejor se adapte a ti. Accede a películas y series con beneficios exclusivos."
    />
    <meta name="author" content="DreamTeam" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="shortcut icon"
      href="/assets/img/Logo1.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/css/suscripcion.css" />
    <title>CineVerse | Suscripción</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg topbar sticky-top">
        <div class="container-fluid px-4">
          <a
            class="navbar-brand logo-box d-flex align-items-center"
            href="/index.html"
          >
            <img
              src="/assets/img/Logo1.png"
              alt="Logo CineVerse"
              class="me-2"
            />
            <span
              ><span class="cine-white">Cine</span
              ><span class="cine-red">Verse</span></span
            >
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 menu">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="/index.html"
                  >Inicio</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pages/pelicula.html">Peliculas</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pages/series.html">Series</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pages/nosotros.html">Nosotros</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/pages/contacto.html">Contacto</a>
              </li>
            </ul>
            <div class="d-flex align-items-center right-side">
              <form class="buscador me-3 d-flex" role="search">
                <input
                  class="form-control me-2"
                  type="search"
                  placeholder="Buscar películas o series..."
                  aria-label="Search"
                />
                <button class="btn btn-outline-success" type="submit">
                  Search
                </button>
              </form>
              <button
                type="button"
                class="btn btn-login me-2"
                data-bs-toggle="modal"
                data-bs-target="#exampleModal"
              >
                Login
              </button>
              <a href="/pages/suscripcion.html" class="btn btn-suscribir"
                >Suscribirse</a
              >
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main></main>
    <footer></footer>
    <div
      class="modal fade"
      id="exampleModal"
      tabindex="-1"
      aria-labelledby="exampleModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">...</div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary">Save changes</button>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
